<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implementacion-1</title>
    <link rel="stylesheet" href="assets/index.css">
</head>
<body>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* transition: background-color 0.3s, color 0.3s; */
            background-color: white; 
            color: black;           
        }
.container {
            text-align: center;
            padding: 2rem;
            border: 1px solid #000000;
            border-radius: 12px;
        }

#btnColores{
    display: block;
            margin: 1rem auto;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            border: 1px solid #555;
            background-color: #eee;
}
#btnColores:hover{
    filter: brightness(1);
}
    </style>
    <div class="container" >
<h2>Escribe algo </h2>
<input type="text" id="inputCajaTexto" placeholder="Escribe algo..">
<button id="btnColores"> Cambia de color </button>
    </div>
    <script src="app.js"></script>
    <script>
        const input = document.getElementById('inputCajaTexto');

input.addEventListener('keydown', function(event) {
    if(event.key === 'Enter') {
        const texto = input.value;
        if(texto.trim() !== '') {
            alert('Has escrito: ' + texto);
        }else{
            alert("Escribe algo primero")
        }
    }
})

const boton = document.getElementById('btnColores');
const colores= [
    {fondo: "white", texto: "black"},
    {fondo: "black", texto: "white"},
    {fondo: "blue", texto: "red"}
];

let indiceColor = 0;

boton.addEventListener('click', () =>{
    indiceColor = (indiceColor + 1) % colores.length;
    const nuevoEstado = colores[indiceColor];

    document.body.style.backgroundColor = nuevoEstado.fondo;
    document.body.style.color = nuevoEstado.texto;
});

    </script>
</body>
</html>
